<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>台股量化戰報 Dashboard</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📈%3C/text%3E%3C/svg%3E">
<style>
:root{
  --bg:#0e1117;--panel:#161b22;--panel2:#1f242c;--border:#30363d;
  --text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;
  --green:#3fb950;--red:#f85149;--yellow:#d29922;--purple:#bc8cff;
  font-size: clamp(13px, 3.5vw, 16px);
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
  font-size:1rem}
a{color:var(--accent);text-decoration:none}
header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;
  padding:14px 22px;border-bottom:1px solid var(--border);background:var(--panel)}
header h1{margin:0;font-size:1.15rem}
header h1 small{font-weight:400;color:var(--muted);margin-left:8px;font-size:0.75rem}
.container{max-width:1400px;margin:0 auto;padding:18px}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:16px;overflow-x:auto}
.tab{padding:10px 18px;cursor:pointer;border:none;background:transparent;color:var(--muted);
  font-size:0.875rem;border-bottom:2px solid transparent;white-space:nowrap}
.tab.active{color:var(--text);border-bottom-color:var(--accent);font-weight:600}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:8px;
  padding:16px;margin-bottom:16px;overflow:hidden}
.panel h2{margin:0 0 12px 0;font-size:0.9375rem}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:900px){.grid-4{grid-template-columns:repeat(2,1fr)}}
.stat{background:var(--panel2);border:1px solid var(--border);border-radius:6px;padding:14px}
.stat .label{color:var(--muted);font-size:0.75rem;margin-bottom:4px}
.stat .value{font-size:1.4rem;font-weight:700}
.stat .sub{color:var(--muted);font-size:0.7rem;margin-top:2px}
table{width:100%;border-collapse:collapse;font-size:0.85rem}
th,td{text-align:left;padding:6px 10px;border-bottom:1px solid var(--border);white-space:nowrap}
th{color:var(--muted);font-weight:600;background:var(--panel2);position:sticky;top:0}
tbody tr:hover{background:var(--panel2)}
.num{text-align:right;font-variant-numeric:tabular-nums}
.pos{color:var(--green)}
.neg{color:var(--red)}
.pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:0.7rem;font-weight:600}
.grade-SS{background:#bc8cff33;color:#d2b8ff}
.grade-S{background:#58a6ff33;color:#79c0ff}
.grade-A{background:#3fb95033;color:#7ee787}
.grade-CHASE{background:#f8514933;color:#ffa198}
.grade-WATCH{background:#d2992233;color:#f0c674}
.fill-filled{background:#3fb95033;color:#7ee787}
.fill-missed{background:#f8514933;color:#ffa198}
.fill-pending{background:#8b949e33;color:#c9d1d9}
.fill-watch{background:#d2992233;color:#f0c674}
.scroll{overflow-x:auto;max-height:75vh}
.empty{padding:30px;text-align:center;color:var(--muted)}
.btn{background:var(--panel2);border:1px solid var(--border);color:var(--text);
  padding:6px 12px;border-radius:6px;cursor:pointer;font-size:0.85rem}
.btn:hover{background:var(--border)}
.updated{color:var(--muted);font-size:0.75rem}
footer{text-align:center;color:var(--muted);font-size:0.75rem;padding:18px}
</style>
</head>
<body>
<header>
  <h1>📈 台股量化戰報 <small>stock_bot_share · 純網頁版</small></h1>
  <div>
    <span id="updated" class="updated">載入中…</span>
    <a href="./admin.html" class="btn" style="margin-left:10px">🛠️ 操作</a>
    <button class="btn" onclick="reloadAll()" style="margin-left:6px">🔄 重新整理</button>
  </div>
</header>

<div class="container">
  <div class="tabs">
    <button class="tab active" data-tab="today">今日篩選</button>
    <button class="tab" data-tab="stats">勝率統計</button>
    <button class="tab" data-tab="history">歷史紀錄</button>
  </div>

  <div id="tab-today">
    <div class="panel">
      <h2>📊 今日篩選結果</h2>
      <div id="todayMeta" class="updated"></div>
      <div class="scroll" style="margin-top:10px"><div id="todayBody"></div></div>
    </div>
  </div>

  <div id="tab-stats" style="display:none">
    <div class="panel">
      <h2>🏆 累積總覽</h2>
      <div id="statsSummary" class="grid-4"></div>
    </div>
    <div class="panel">
      <h2>📈 各等級勝率</h2>
      <div class="scroll"><div id="statsByGrade"></div></div>
    </div>
  </div>

  <div id="tab-history" style="display:none">
    <div class="panel">
      <h2>📚 最近 90 天紀錄</h2>
      <div class="scroll"><div id="historyBody"></div></div>
    </div>
  </div>
</div>

<footer>
  <p>本系統僅供研究用途，不構成投資建議。資料來源：TWSE。</p>
  <p>原始碼：<a href="https://github.com/znxuyz/stock_bot_share" target="_blank">znxuyz/stock_bot_share</a></p>
</footer>

<script>
let DATA = {today:null, stats:null, history:null, config:null};

async function loadJson(name){
  try {
    const r = await fetch(`./data/${name}.json?ts=${Date.now()}`);
    if(!r.ok) return null;
    return await r.json();
  } catch(e){ return null; }
}

async function reloadAll(){
  document.getElementById('updated').textContent = '載入中…';
  const [today, stats, history, config] = await Promise.all([
    loadJson('today'), loadJson('stats'), loadJson('history'), loadJson('config'),
  ]);
  DATA = {today, stats, history, config};
  document.getElementById('updated').textContent =
    today && today.updated_at ? `更新於 ${today.updated_at}` : '尚無資料';
  renderToday(); renderStats(); renderHistory();
}

function pill(cls, text){ return `<span class="pill ${cls}">${text}</span>`; }
function num(v, dp=2){
  if(v == null || v === '') return '-';
  const n = Number(v);
  if(isNaN(n)) return '-';
  return n.toFixed(dp);
}
function pctSign(v){
  if(v == null) return '-';
  const n = Number(v);
  const cls = n > 0 ? 'pos' : n < 0 ? 'neg' : '';
  const sign = n >= 0 ? '+' : '';
  return `<span class="${cls}">${sign}${n.toFixed(2)}%</span>`;
}

function renderToday(){
  const wrap = document.getElementById('todayBody');
  const meta = document.getElementById('todayMeta');
  const t = DATA.today;
  if(!t || !t.records || !t.records.length){
    wrap.innerHTML = '<p class="empty">尚無篩選資料</p>';
    meta.textContent = '';
    return;
  }
  meta.textContent = `篩選日：${t.screen_date}　共 ${t.count} 檔`;
  let html = `<table><thead><tr>
    <th>等級</th><th>代號</th><th>名稱</th>
    <th class="num">分數</th><th class="num">收盤</th><th class="num">漲幅</th>
    <th class="num">量比</th><th class="num">乖離</th>
    <th>進場區間</th><th>狀態</th><th class="num">實際進場</th>
    <th class="num">目標一</th><th class="num">目標二</th><th class="num">停損</th>
    <th class="num">1週結算%</th></tr></thead><tbody>`;
  for(const r of t.records){
    const fillCls = `fill-${r.fill_status || 'pending'}`;
    const gradeCls = `grade-${r.grade}`;
    const zone = (r.entry_zone_low != null && r.entry_zone_high != null)
      ? `${num(r.entry_zone_low,1)}~${num(r.entry_zone_high,1)}` : '-';
    html += `<tr>
      <td>${pill(gradeCls, r.grade || '-')}</td>
      <td><b>${r.sid}</b></td>
      <td>${r.name || '-'}</td>
      <td class="num">${r.score || '-'}</td>
      <td class="num">${num(r.close_price,1)}</td>
      <td class="num">${pctSign(r.change_pct)}</td>
      <td class="num">${num(r.vol_ratio,1)}x</td>
      <td class="num">${pctSign(r.bias_pct)}</td>
      <td>${zone}</td>
      <td>${pill(fillCls, r.fill_status || 'pending')}</td>
      <td class="num">${num(r.actual_entry_price,1)}</td>
      <td class="num">${num(r.actual_target1,1)}</td>
      <td class="num">${num(r.actual_target2,1)}</td>
      <td class="num">${num(r.actual_stop_loss,1)}</td>
      <td class="num">${pctSign(r.settle1_pct)}</td>
    </tr>`;
  }
  html += '</tbody></table>';
  wrap.innerHTML = html;
}

function renderStats(){
  const sumWrap = document.getElementById('statsSummary');
  const gradeWrap = document.getElementById('statsByGrade');
  const s = DATA.stats;
  if(!s){
    sumWrap.innerHTML = '<p class="empty">尚無統計資料</p>';
    gradeWrap.innerHTML = '';
    return;
  }
  const sm = s.summary || {};
  const fr = sm.filled && (sm.filled + sm.missed) ? (sm.filled / (sm.filled + sm.missed) * 100).toFixed(1) : '-';
  const wr = sm.settled1 ? (sm.win1 / sm.settled1 * 100).toFixed(1) : '-';
  sumWrap.innerHTML = `
    <div class="stat"><div class="label">累積筆數</div>
      <div class="value">${sm.total || 0}</div>
      <div class="sub">已成交 ${sm.filled||0} / 未進場 ${sm.missed||0}</div></div>
    <div class="stat"><div class="label">進場率</div>
      <div class="value">${fr}%</div>
      <div class="sub">filled / (filled + missed)</div></div>
    <div class="stat"><div class="label">1週賺錢勝率</div>
      <div class="value">${wr}%</div>
      <div class="sub">${sm.win1||0} / ${sm.settled1||0}</div></div>
    <div class="stat"><div class="label">平均報酬</div>
      <div class="value">${num(sm.avg_ret1,2)}%</div>
      <div class="sub">最佳 ${num(sm.best_ret1,1)}% / 最差 ${num(sm.worst_ret1,1)}%</div></div>`;

  const gr = s.by_grade || [];
  if(!gr.length){ gradeWrap.innerHTML = '<p class="empty">尚無等級分組資料</p>'; return; }
  let html = `<table><thead><tr>
    <th>等級</th><th class="num">總數</th><th class="num">已成交</th><th class="num">未進場</th>
    <th class="num">已結算</th><th class="num">獲利</th>
    <th class="num">賺錢勝率</th><th class="num">平均報酬</th>
    <th class="num">命中目標一</th><th class="num">命中目標二</th><th class="num">觸停損</th></tr></thead><tbody>`;
  for(const g of gr){
    const wr2 = g.settled1 ? (g.win1 / g.settled1 * 100).toFixed(1) : '-';
    html += `<tr>
      <td>${pill('grade-' + g.grade, g.grade)}</td>
      <td class="num">${g.total}</td>
      <td class="num">${g.filled||0}</td>
      <td class="num">${g.missed||0}</td>
      <td class="num">${g.settled1||0}</td>
      <td class="num">${g.win1||0}</td>
      <td class="num">${wr2}%</td>
      <td class="num">${pctSign(g.avg_ret1)}</td>
      <td class="num">${g.hit_t1||0}</td>
      <td class="num">${g.hit_t2||0}</td>
      <td class="num">${g.hit_sl||0}</td>
    </tr>`;
  }
  html += '</tbody></table>';
  gradeWrap.innerHTML = html;
}

function renderHistory(){
  const wrap = document.getElementById('historyBody');
  const h = DATA.history;
  if(!h || !h.records || !h.records.length){
    wrap.innerHTML = '<p class="empty">尚無歷史紀錄</p>';
    return;
  }
  let html = `<table><thead><tr>
    <th>日期</th><th>等級</th><th>代號</th><th>名稱</th>
    <th class="num">分數</th><th class="num">收盤</th><th class="num">漲幅</th>
    <th>狀態</th><th class="num">1週結算%</th><th class="num">2週結算%</th></tr></thead><tbody>`;
  for(const r of h.records){
    html += `<tr>
      <td>${r.screen_date}</td>
      <td>${pill('grade-' + r.grade, r.grade || '-')}</td>
      <td><b>${r.sid}</b></td>
      <td>${r.name || '-'}</td>
      <td class="num">${r.score || '-'}</td>
      <td class="num">${num(r.close_price,1)}</td>
      <td class="num">${pctSign(r.change_pct)}</td>
      <td>${pill('fill-' + (r.fill_status||'pending'), r.fill_status || 'pending')}</td>
      <td class="num">${pctSign(r.settle1_pct)}</td>
      <td class="num">${pctSign(r.settle2_pct)}</td>
    </tr>`;
  }
  html += '</tbody></table>';
  wrap.innerHTML = html;
}

document.querySelectorAll('.tab').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    for(const id of ['today','stats','history']){
      document.getElementById('tab-' + id).style.display = (id === b.dataset.tab) ? '' : 'none';
    }
  });
});

reloadAll();
</script>
</body>
</html>
